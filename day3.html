<html>
    <head>
        <title>Reg Form</title>
    
    </head>
    <h1 ><center>Form</center></h1>
    <body bgcolor="lightblue">
<form>
<fieldset><legend>Personal Info</legend>
    First Name:
    <input type="text" name="firstname" placeholder="First Name"><br><br>
    Middle Name:
    <input type="text" name="middlename" placeholder="Middle Name"><br><br>
    Last Name:
    <input type="text" name=" lastname" placeholder="Last Name"><br><br>
    Password:
    <input type="text" name="Password"><br><br>
    Phone:
    <input type="tel" name="phone" pattern="[0-9]{10}" placeholder="+91"><br><br>
     Email:
     <input type="text" name=" Email" placeholder="Email"><br><br>
     Date Of Birth:
     <input type="number" name=" dateofbirth" placeholder="dd/mm/yyyy"><br><br></fieldset>  
     Favorite Color:
     <input type="color" name="color"><br><br>
     Gender:
      <input type="radio" name="gender" value="male">male
       <input type="radio" name="gender" value="female">female
        <input type="radio" name="gender" value="other">other <br><br>
        Hobbies:
         <input type="checkbox" name="hobby" value="reading">reading 
          <input type="checkbox" name="hobby" value="singing">singing 
           <input type="checkbox" name="hobby" value="drawing">drawing 
            <input type="checkbox" name="hobby" value="playing">playing 
             <input type="checkbox" name="hobby" value="danceing">danceing <br><br>
             Specifaction Level:
             <input type="   " min="1" max="10"><br><br>
     Branch:
     <select name="Branch">
        <option value="CSE">CSE</option>
         <option value="IT">IT</option>
          <option value="EXTC"> EXTC</option>
           <option value="ELPO">ELPO</option>
        </select> <br><br>
     Subjects (select multiple):
     <select name="Subjects" multiple >
        <option value="English">English</option>
         <option value="M1">M1</option>
          <option value="M2">M2</option>
           <option value="EG">EG</option>
</select><br><br>
Upload Image:
<input type="file" name="photo" accept="image/*"><br><br>
Adddress:
<textarea name="address" cols="20" rows="5" placeholder="Enter Your Current Adderss"></textarea><br><br>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</form>

</body>
</html>
